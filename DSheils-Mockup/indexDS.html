<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Veterinary Fund</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="top-slice"></div>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">logo</div>
        </div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#">Donate</a></li>
                <li><a href="#scholarships">Scholarships</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-image">
                <img src="media/vetcat.jpg" alt="Vet examining a cat">
            </div>
            <div class="hero-content">
                <h1>Welcome to the <br><span class="highlight">Global<br>Veterinary Fund</span></h1>
                <p>Apply for scholarships, donate, or<br>learn more</p>
            </div>
        </section>

        <section class="scholarships" id="scholarships">
            <div class="scholarships-content">
                <h2>Apply for Scholarships</h2>
                <p>We provide financial aid to aspiring<br>veterinary students</p>
                <a href="#" class="btn">Fill Out the App &rarr;</a>
            </div>
            <div class="scholarships-image">
                <img src="media/grad.jpg" alt="Student wearing graduation cap">
            </div>
        </section>
        
        <section class="bottom-filler"></section>
    </main>

</body>
</html>
